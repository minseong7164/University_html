<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
    <style>
        p.thick {
            border-style: solid;
            border-width: thick;
            border-color: green;
        }
        p.medium {
            border-style: solid;
            border-width: medium;
            border-color: red;
        }
        p.thin {
            border-style: solid;
            border-width: 5px;
            border-color: blue;
        }
        div {
            border: 30px solid transparent;
            width: 300px;
            height: 50px;
            border-image: url(border.png) 30 30 round;
            /* border-radius: 25px; */
        }
        #target {
            margin: 10px;
            padding: 20px;
            border: 1px solid red;
            width: 100px;
            height: 50px;
            background-color: yellow;
        }
        body{
            margin: 0px;
            padding: 0px;
        }
        p{
            margin: 10px;
            padding: 20px;
            background-color: aqua;
        }
    </style>
<body>
    <p id="target" style="border-style:solid" >none</p>
    <div>border-radius 속성을 사용하면 둥근 경계선을 만들 수 있습니다.</div>
    <p style="border-style: none;">none</p>
    <p class="thick" style="border-style: dotted;">dotted</p>
    <p class="medium" style="border-style: solid;">solid</p>
    <p class="thin" style="border-style: double;">double</p>
    <p style="border-style: groove; text-align: center;"  >groove</p>
    <p style="border-style: ridge; margin-left: auto; margin-right: auto; width: 50%;">ridge</p>
    <p style="border-style: inset;">inset</p>
    <p style="border-style: outset;">outset</p>
</body>
</html>
