<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        img { opacity: 0.4 ;}
        img:hover { opacity: 1.0;}
        img#a:hover{
            visibility: hidden;
            border: 1px dotted red;
        }
        img#b{
            visibility: visible;
            border: 1px dotted red;
        }
        div{
            width: 100px;
            height: 50px;
            border: 1px solid black;
            background-color: yellow;
            transition: width 5s height 5s, border 5s, transform 5s;
            -webkit-transition: width 5s, height 5s, border 5s, -webkit-transform 5s;
        }
        div:hover{
            width: 200px;
            height: 100px;
            border: 10px solid red;
            transform: rotate(180deg);
            -webkit-transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <h1>Opacity 속성</h1>
    <img id="a" src="back1.jpg" width="150" alt="back1">
    <img id="b" src="border.png" width="150" height="120" alt="border">
    <div>마우스를 올려보세요.</div>
</body>
</html>
