<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>2023년 3월 1일 9시 정각을 입력해보세요.</h2>
    <form>
        date 타입 <input type="date" value="2023-03-01"><br>
        datetime-local 타입<input type="datetime-local"><br>
        time 타입<input type="month"><br>
        week 타입<input type="week"><br>
        <input type="color"value="=ff00f"><br>
        신발사이즈(230-290,10단위)<input type="number" min="230" max="290" step="10" value="260"><br>
        테니스 스킬(1부터10)<input type="range" min="1" max="10" value="1"><br>
        <input type="submit"><input type="reset">
    </form>
</body>
</html>
